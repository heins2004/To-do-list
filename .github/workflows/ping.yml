name: Keep Render Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        env:
          DEFAULT_PING_URL: https://habit-tracker-dashboard-pgo7.onrender.com/ping/
          PING_URL: ${{ secrets.RENDER_PING_URL }}
        run: |
          TARGET_URL="${PING_URL:-$DEFAULT_PING_URL}"

          if [ -z "$TARGET_URL" ]; then
            echo "No ping URL is configured."
            exit 1
          fi

          curl --fail --silent --show-error --location \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --write-out "\nHTTP %{http_code}\n" \
            "$TARGET_URL"
