{% extends "base.html" %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<section class="hero">
    <h1>Delete Task</h1>
    <p>This action removes the task permanently.</p>
</section>

<section class="panel" style="max-width: 720px;">
    <p>Are you sure you want to delete <strong>{{ task.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button class="danger" type="submit">Yes, Delete</button>
        <a class="button-link alt" href="{% url 'task_list' %}">Cancel</a>
    </form>
</section>
{% endblock %}
