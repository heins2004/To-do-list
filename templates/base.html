<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}To-Do CRUD App{% endblock %}</title>
    <style>
        :root {
            --bg: #f4efe6;
            --card: #fffaf3;
            --ink: #1f2933;
            --muted: #6b7280;
            --accent: #c2410c;
            --accent-dark: #9a3412;
            --success: #166534;
            --warning: #9a3412;
            --border: #e5dccf;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, #ffe0b2 0, transparent 28%),
                linear-gradient(135deg, #f4efe6 0%, #f8f5ef 45%, #efe7da 100%);
            color: var(--ink);
            min-height: 100vh;
        }

        .container {
            width: min(1100px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
        }

        .hero {
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.25rem);
        }

        .hero p {
            color: var(--muted);
            margin: 0.5rem 0 0;
            max-width: 700px;
        }

        .grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 320px 1fr;
        }

        .panel {
            background: rgba(255, 250, 243, 0.94);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(71, 51, 29, 0.08);
            padding: 1.5rem;
        }

        .panel h2 {
            margin-top: 0;
        }

        form p {
            margin: 0 0 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.35rem;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.8rem 0.9rem;
            border-radius: 12px;
            border: 1px solid #d5c7b6;
            background: #fff;
            font: inherit;
        }

        button, .button-link {
            display: inline-block;
            border: 0;
            border-radius: 999px;
            padding: 0.75rem 1.1rem;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover, .button-link:hover {
            background: var(--accent-dark);
        }

        .button-link.alt {
            background: #fff;
            color: var(--ink);
            border: 1px solid var(--border);
        }

        .messages {
            margin-bottom: 1rem;
        }

        .message {
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            color: var(--success);
            padding: 0.85rem 1rem;
            border-radius: 14px;
            margin-bottom: 0.75rem;
        }

        .task-list {
            display: grid;
            gap: 1rem;
        }

        .task-card {
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1rem;
            background: #fff;
        }

        .task-card.completed {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .task-head {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: start;
        }

        .task-head h3 {
            margin: 0 0 0.35rem;
        }

        .badge {
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge.pending {
            background: #ffedd5;
            color: var(--warning);
        }

        .badge.completed {
            background: #dcfce7;
            color: var(--success);
        }

        .task-meta {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .task-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
            margin-top: 1rem;
        }

        .empty-state {
            padding: 2rem;
            text-align: center;
            color: var(--muted);
            border: 1px dashed #cfbea8;
            border-radius: 18px;
        }

        .danger {
            background: #b91c1c;
        }

        .danger:hover {
            background: #991b1b;
        }

        .errorlist {
            color: #b91c1c;
            margin: 0.25rem 0 0.5rem;
        }

        @media (max-width: 820px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
